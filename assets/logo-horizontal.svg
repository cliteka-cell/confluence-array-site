<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="g-xl" x="-400%" y="-400%" width="900%" height="900%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
    <filter id="g-lg" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <filter id="g-md" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5"/>
    </filter>
    <filter id="g-sm" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="g-xs" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
    </filter>
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a3a8a" stop-opacity="0.30"/>
      <stop offset="60%"  stop-color="#0d1e50" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#080808"/>

  <!-- Nebula behind cluster -->
  <ellipse cx="100" cy="100" rx="90" ry="85" fill="url(#nebula)"/>

  <!-- Constellation lines -->
  <g stroke="#4d8eff" stroke-opacity="0.22" stroke-width="0.8" fill="none" stroke-linecap="round">
    <line x1="100" y1="100" x2="74"  y2="71"/>
    <line x1="100" y1="100" x2="68"  y2="113"/>
    <line x1="100" y1="100" x2="109" y2="59"/>
    <line x1="100" y1="100" x2="116" y2="117"/>
    <line x1="74"  y1="71"  x2="91"  y2="51"/>
    <line x1="109" y1="59"  x2="91"  y2="51"/>
    <line x1="74"  y1="71"  x2="109" y2="59"/>
    <line x1="100" y1="100" x2="137" y2="96" stroke-opacity="0.13"/>
  </g>

  <!-- ALCYONE -->
  <circle cx="100" cy="100" r="22" fill="#1a4acc" opacity="0.10" filter="url(#g-xl)"/>
  <circle cx="100" cy="100" r="14" fill="#2060f0" opacity="0.20" filter="url(#g-lg)"/>
  <circle cx="100" cy="100" r="7"  fill="#5090ff" opacity="0.55" filter="url(#g-md)"/>
  <circle cx="100" cy="100" r="3"  fill="#b8d4ff" opacity="0.85" filter="url(#g-xs)"/>
  <circle cx="100" cy="100" r="2.2" fill="#ffffff"/>

  <!-- MAIA -->
  <circle cx="74" cy="71" r="14" fill="#1a4acc" opacity="0.10" filter="url(#g-xl)"/>
  <circle cx="74" cy="71" r="9"  fill="#2060f0" opacity="0.18" filter="url(#g-lg)"/>
  <circle cx="74" cy="71" r="5"  fill="#5090ff" opacity="0.50" filter="url(#g-md)"/>
  <circle cx="74" cy="71" r="2"  fill="#c8e0ff" opacity="0.85" filter="url(#g-xs)"/>
  <circle cx="74" cy="71" r="1.5" fill="#ffffff"/>

  <!-- ELECTRA -->
  <circle cx="68" cy="113" r="14" fill="#1a4acc" opacity="0.10" filter="url(#g-xl)"/>
  <circle cx="68" cy="113" r="9"  fill="#2060f0" opacity="0.18" filter="url(#g-lg)"/>
  <circle cx="68" cy="113" r="5"  fill="#5090ff" opacity="0.48" filter="url(#g-md)"/>
  <circle cx="68" cy="113" r="2"  fill="#c8e0ff" opacity="0.85" filter="url(#g-xs)"/>
  <circle cx="68" cy="113" r="1.5" fill="#ffffff"/>

  <!-- TAYGETA -->
  <circle cx="109" cy="59" r="12" fill="#1a4acc" opacity="0.09" filter="url(#g-xl)"/>
  <circle cx="109" cy="59" r="8"  fill="#2060f0" opacity="0.16" filter="url(#g-lg)"/>
  <circle cx="109" cy="59" r="4"  fill="#5090ff" opacity="0.45" filter="url(#g-md)"/>
  <circle cx="109" cy="59" r="1.8" fill="#d4e8ff" opacity="0.85" filter="url(#g-xs)"/>
  <circle cx="109" cy="59" r="1.3" fill="#ffffff"/>

  <!-- MEROPE -->
  <circle cx="116" cy="117" r="12" fill="#1a4acc" opacity="0.09" filter="url(#g-xl)"/>
  <circle cx="116" cy="117" r="8"  fill="#2060f0" opacity="0.16" filter="url(#g-lg)"/>
  <circle cx="116" cy="117" r="4"  fill="#5090ff" opacity="0.45" filter="url(#g-md)"/>
  <circle cx="116" cy="117" r="1.8" fill="#d4e8ff" opacity="0.85" filter="url(#g-xs)"/>
  <circle cx="116" cy="117" r="1.3" fill="#ffffff"/>

  <!-- CELAENO -->
  <circle cx="91" cy="51" r="10" fill="#1a4acc" opacity="0.08" filter="url(#g-xl)"/>
  <circle cx="91" cy="51" r="6"  fill="#2060f0" opacity="0.14" filter="url(#g-md)"/>
  <circle cx="91" cy="51" r="3"  fill="#5090ff" opacity="0.40" filter="url(#g-sm)"/>
  <circle cx="91" cy="51" r="1.4" fill="#e0eeff" opacity="0.85" filter="url(#g-xs)"/>
  <circle cx="91" cy="51" r="1"  fill="#ffffff"/>

  <!-- ATLAS -->
  <circle cx="137" cy="96" r="8"  fill="#1a4acc" opacity="0.07" filter="url(#g-xl)"/>
  <circle cx="137" cy="96" r="5"  fill="#2060f0" opacity="0.12" filter="url(#g-md)"/>
  <circle cx="137" cy="96" r="2.5" fill="#5090ff" opacity="0.35" filter="url(#g-sm)"/>
  <circle cx="137" cy="96" r="1.1" fill="#e8f2ff" opacity="0.80" filter="url(#g-xs)"/>
  <circle cx="137" cy="96" r="0.8" fill="#ffffff"/>

  <!-- Wordmark -->
  <text x="178" y="88"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="28" font-weight="700" letter-spacing="4"
        fill="#ffffff">CONFLUENCE</text>
  <text x="178" y="124"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="28" font-weight="700" letter-spacing="4"
        fill="#2060f0">ARRAY</text>
  <!-- Thin divider line between icon and text -->
  <line x1="164" y1="52" x2="164" y2="148" stroke="#2060f0" stroke-opacity="0.3" stroke-width="1"/>
</svg>
